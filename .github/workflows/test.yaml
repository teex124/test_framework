name: Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write
  pages: write
  pull-requests: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: '3.13'
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps

      - name: Run tests with Allure
        run: uv run pytest --alluredir=allure-results --clean-alluredir
        continue-on-error: true

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Create history directory
        if: always()
        run: |
          if [ -d "gh-pages/allure-history" ]; then
            mkdir -p allure-history
            cp -r gh-pages/allure-history/* allure-history/ 2>/dev/null || true
          else
            mkdir -p allure-history
          fi

      - name: Allure Report action from marketplace
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Verify allure report structure
        if: always()
        run: |
          echo "📁 Checking allure-history structure..."
          ls -la allure-history/ || echo "allure-history not found"
          echo "📁 Checking widgets folder..."
          ls -la allure-history/widgets/ || echo "widgets folder not found"
          
          if [ ! -f "allure-history/widgets/summary.json" ]; then
            echo "⚠️ summary.json not found in widgets folder"
            echo "Searching for summary.json..."
            find . -name "summary.json" || echo "summary.json not found anywhere"
          else
            echo "✅ summary.json found in widgets folder"
          fi

      - name: Prepare report for notifications
        if: always()
        run: |
          echo "📦 Preparing report for notifications..."
          
          # Создаём структуру, которую ожидает allure-notifications
          mkdir -p allure-report
          
          # Копируем все файлы из allure-history в allure-report
          if [ -d "allure-history" ]; then
            cp -r allure-history/* allure-report/ 2>/dev/null || true
          fi
          
          # Если widgets нет, но есть summary.json в корне
          if [ -f "allure-report/summary.json" ] && [ ! -d "allure-report/widgets" ]; then
            echo "Moving summary.json to widgets folder..."
            mkdir -p allure-report/widgets
            mv allure-report/summary.json allure-report/widgets/
          fi
          
          # Проверяем финальную структуру
          echo "✅ Final report structure:"
          ls -la allure-report/
          if [ -d "allure-report/widgets" ]; then
            echo "Widgets folder contents:"
            ls -la allure-report/widgets/
          fi

      - name: Download allure-notifications jar
        if: always()
        run: |
          echo "⬇️ Downloading allure-notifications..."
          mkdir -p notifications
          curl -L -o notifications/allure-notifications-4.11.0.jar \
            https://github.com/qa-guru/allure-notifications/releases/download/4.11.0/allure-notifications-4.11.0.jar
          echo "✅ Jar downloaded"

      - name: Create notifications config for CI
        if: always()
        run: |
          echo "📝 Creating notifications config..."

          REPORT_URL="https://teex124.github.io/test_framework/${{ github.run_number }}"
          echo "Report URL: $REPORT_URL"

          # Обработка topic_id
          TOPIC_ID="${{ secrets.TELEGRAM_TOPIC_ID }}"
          if [ -z "$TOPIC_ID" ] || [ "$TOPIC_ID" = "" ]; then
            TOPIC_ID=""
          fi

          cat > notifications/config.json << EOF
          {
            "base": {
              "logo": "",
              "project": "${{ github.event.repository.name }}",
              "environment": "${{ github.ref_name }}",
              "comment": "Run #${{ github.run_number }} | Commit: ${{ github.sha }}",
              "reportLink": "${REPORT_URL}",
              "language": "ru",
              "allureFolder": "allure-report",
              "enableChart": true,
              "enableSuitesPublishing": false,
              "customData": {}
            },
            "telegram": {
              "token": "${{ secrets.TELEGRAM_BOT_TOKEN }}",
              "chat": "${{ secrets.TELEGRAM_CHAT_ID }}",
              "topic": "${TOPIC_ID}",
              "replyTo": "",
              "templatePath": "/templates/telegram.ftl"
            }
          }
          EOF

          echo "✅ Config created"

      - name: Send notification to Telegram
        if: always()
        run: |
          echo "🚀 Sending notification to Telegram..."
          java "-DconfigFile=notifications/config.json" \
               -jar notifications/allure-notifications-4.11.0.jar
          echo "✅ Notification sent"

      - name: Deploy report to Github Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./allure-history
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Update Allure report'

      - name: Upload Allure results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 30

      - name: Upload Allure report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-history
          retention-days: 30

      - name: Comment PR with report URL
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const reportUrl = `https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/`;
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? '✅' : '⚠️';
            
            const comment = `${emoji} **Allure Test Report**\n\n`;
            let body = comment + `📊 Report URL: ${reportUrl}\n\n`;
            body += `🔍 Tests completed with status: ${status}\n`;
            body += `📁 Results can be downloaded from workflow artifacts`;
            
            try {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } catch(e) {
              console.log('Could not add comment to PR:', e);
            }